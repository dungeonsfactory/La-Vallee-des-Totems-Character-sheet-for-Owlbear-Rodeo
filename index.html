<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiches de Personnage</title>
  <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk"></script>
  <style>
    body { font-family: sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 15px; }
    .io-panel { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; background: #222; padding: 8px; border-radius: 6px; }
    .btn-io { background: #444; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    .banner-img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; }
    .grid { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; margin-top: 15px; }
    input { width: 60px; background: #333; color: white; border: 1px solid #555; text-align: center; }
  </style>
</head>
<body>
  <div class="io-panel">
    <button class="btn-io" id="btnSave">Sauvegarder</button>
    <button class="btn-io" id="btnLoad">Charger</button>
    <input type="file" id="fileInput" style="display:none">
  </div>
  <img id="charBanner" class="banner-img" src="" />
  <select id="charSelect" style="width:100%; padding:10px;"></select>
  <div id="statsContainer" class="grid"></div>
  <script src="script.js"></script>
</body>
</html>
