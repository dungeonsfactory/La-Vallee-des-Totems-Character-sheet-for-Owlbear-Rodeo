<!DOCTYPE html>
<html lang="fr">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://raw.githubusercontent.com; img-src 'self' data: https://raw.githubusercontent.com;">
  <meta charset="UTF-8">
  <title>Fiches de Personnage - La Vallée des Totems</title>
  <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 15px; }
    h2 { margin-top: 0; color: #ffaa00; text-align: center; margin-bottom: 5px; }
    h3 { color: #ffaa00; font-size: 14px; border-bottom: 1px solid #444; margin-bottom: 10px; }
    .io-panel { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; background: #222; padding: 8px; border-radius: 6px; border: 1px solid #333; }
    .btn-io { background: #444; color: #fff; border: 1px solid #555; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
    #fileInput { display: none; }
    .banner-container { width: 100%; height: 100px; margin-bottom: 15px; border-radius: 6px; overflow: hidden; background: #2a2a2a; border: 1px solid #333; }
    .banner-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .char-select { width: 100%; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; margin-bottom: 5px; }
    .classe { text-align: center; font-style: italic; color: #aaa; margin-bottom: 5px; }
    .profil-box { display: flex; justify-content: space-around; background: #222; padding: 8px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; font-size: 12px; }
    .grid { display: grid; grid-template-columns: 1fr auto auto; gap: 12px 15px; align-items: center; }
    .grid-header { font-size: 11px; text-transform: uppercase; color: #777; font-weight: bold; margin-bottom: -5px; text-align: center; }
    .grid-header.left { text-align: left; }
    .dice-val { font-family: monospace; font-weight: bold; background: #222; padding: 4px 8px; border-radius: 4px; min-width: 35px; text-align: center; }
    .aspect-val { font-weight: bold; color: #ffffff; padding: 4px 8px; border-radius: 4px; min-width: 35px; text-align: center; }
    .color-fire { color: #ff4d4d; } .bg-fire { background: #8b0000; }
    .color-water { color: #2ecc71; } .bg-water { background: #1b4d3e; }
    .color-air { color: #3498db; } .bg-air { background: #1a365d; }
    .color-earth { color: #f39c12; } .bg-earth { background: #7e4a00; }
    .tabs-nav { display: flex; margin-bottom: 15px; border: 1px solid #444; }
    .tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: #333; color: #ccc; }
    .tab-btn.active { background: #444; color: #ffaa00; font-weight: bold; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 20px; color: white; }
    th { background: #444; border: 1px solid #555; padding: 8px; color: #ffaa00; }
    td { border: 1px solid #555; padding: 8px; text-align: center; }
    select { width: 100%; background: #222; color: #fff; border: 1px solid #555; padding: 4px; }
  </style>
</head>
<body>
  <div class="tabs-nav">
    <div class="tab-btn active" onclick="showPane(this, 'pane1')">Stats</div>
    <div class="tab-btn" onclick="showPane(this, 'pane2')">Aptitudes</div>
  </div>

  <div id="pane1" class="tab-pane active">
    <h2>Fiche de Personnage</h2>
    <div class="io-panel">
      <button class="btn-io" onclick="exportCampaignText()">💾 Sauvegarder</button>
      <button class="btn-io" onclick="document.getElementById('fileInput').click()">📂 Charger</button>
      <input type="file" id="fileInput" accept=".json" onchange="importCampaignText(event)">
    </div>
    <div class="banner-container"><img id="charBanner" src="" alt="Portrait" class="banner-img" /></div>
    <select id="charSelect" class="char-select" onchange="changeCharacter()">
      <option value="mayak">Mayak</option><option value="bawak">Bawak</option>
      <option value="cylak">Cylak</option><option value="borak">Borak</option>
    </select>
    <div id="characterClass" class="classe">-</div>
    <div class="profil-box">
      <div class="profil-item">Âge<span id="p-age">-</span></div>
      <div class="profil-item">Taille<span id="p-taille">-</span></div>
      <div class="profil-item">Poids<span id="p-poids">-</span></div>
      <div class="profil-item">Encombrement<span id="p-enc">-</span></div>
    </div>
    <h3>Protection</h3>
    <table>
      <tr><th>Protection</th><th>Forme</th><th>Aspect</th><th>Solidité</th><th>Valeur</th></tr>
      <tr>
        <td><select id="protSelect" onchange="updateProtection()"><option value="">Choisir...</option></select></td>
        <td id="protForme">-</td>
        <td id="protAspect">-</td>
        <td id="protSolidite">-</td>
        <td id="protValeur" style="font-weight:bold">-</td>
      </tr>
    </table>
    <div class="grid" id="statsContainer"></div>
  </div>

  <div id="pane2" class="tab-pane">
    </div>

  <script>
    const EXTENSION_ID = "com.monextension.fiches_simples";
    const aspectTable = { "D12": 6, "D10": 1, "D8": 0, "D6": -1 };
    const protections = { 
        "Robe en Toile de laine": { s: 6, f: "Air", a: "air" }, "Robe en toile Lourde": { s: 7, f: "Air", a: "air" }, 
        "Manteau Lourd": { s: 8, f: "Air", a: "air" }, "Robe d'éclat": { s: 9, f: "Air", a: "air" },
        "Cotte d'écorce": { s: 8, f: "Eau", a: "water" }, "Cotte de lianes": { s: 9, f: "Eau", a: "water" }, 
        "Cotte de planches": { s: 10, f: "Eau", a: "water" }, "Armure de l'Arbre": { s: 11, f: "Eau", a: "water" },
        "Plastron d'écailles": { s: 10, f: "Feu", a: "fire" }, "Plastron de cuir": { s: 11, f: "Feu", a: "fire" }, 
        "Plastron d'os": { s: 12, f: "Feu", a: "fire" }, "Armure du Serpent": { s: 13, f: "Feu", a: "fire" },
        "Armure de mailles": { s: 12, f: "Terre", a: "earth" }, "Armure de lames de Fer": { s: 13, f: "Terre", a: "earth" }, 
        "Armure de Plaques": { s: 14, f: "Terre", a: "earth" }, "Cuirasse du Protecteur": { s: 15, f: "Terre", a: "earth" }
    };
    // ... (votre logique OBR, renderCharacter, et calculs existants) ...
    function updateProtection() {
        const sel = document.getElementById('protSelect');
        const p = protections[sel.value];
        if (!p) return;
        const t = characterTemplates[selectedChar];
        const aspectVal = aspectTable[t[p.a]];
        document.getElementById('protForme').innerText = p.f;
        document.getElementById('protAspect').innerText = (aspectVal >= 0 ? "+" : "") + aspectVal;
        document.getElementById('protSolidite').innerText = p.s;
        document.getElementById('protValeur').innerText = p.s + aspectVal;
        currentStats[selectedChar].protection = sel.value;
        OBR.room.setMetadata({ [EXTENSION_ID]: currentStats });
    }
    // ...
  </script>
</body>
</html>
