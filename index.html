<!DOCTYPE html>
<html lang="fr">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://raw.githubusercontent.com; img-src 'self' data: https://raw.githubusercontent.com;">
  <meta charset="UTF-8">
  <title>Fiches de Personnage - La Vallée des Totems</title>
  <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk"></script>
  <style>
    /* VOTRE CSS ORIGINAL CONSERVÉ */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 15px; }
    h2 { margin-top: 0; color: #ffaa00; text-align: center; margin-bottom: 5px; }
    .io-panel { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; background: #222; padding: 8px; border-radius: 6px; border: 1px solid #333; }
    .btn-io { background: #444; color: #fff; border: 1px solid #555; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
    .btn-io:hover { background: #555; border-color: #ffaa00; }
    #fileInput { display: none; }
    .banner-container { width: 100%; height: 100px; margin-bottom: 15px; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); background: #2a2a2a; border: 1px solid #333; }
    .banner-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    select.char-select { width: 100%; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; margin-bottom: 5px; font-size: 16px; }
    .classe { text-align: center; font-style: italic; color: #aaa; margin-bottom: 5px; font-size: 14px; }
    .profil-box { display: flex; justify-content: space-around; background: #222; padding: 8px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; font-size: 12px; gap: 5px; }
    .profil-item { text-align: center; flex: 1; }
    .profil-item span { display: block; color: #ffaa00; font-weight: bold; font-size: 14px; margin-top: 2px; }
    .grid { display: grid; grid-template-columns: 1fr auto auto; gap: 12px 15px; align-items: center; }
    .grid-header { font-size: 11px; text-transform: uppercase; color: #777; font-weight: bold; margin-bottom: -5px; text-align: center; }
    .grid-header.left { text-align: left; }
    label { font-weight: bold; }
    .dice-val { font-family: monospace; font-weight: bold; background: #222; padding: 4px 8px; border-radius: 4px; min-width: 35px; text-align: center; }
    .aspect-val { font-weight: bold; color: #ffffff; padding: 4px 8px; border-radius: 4px; min-width: 35px; text-align: center; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
    .color-fire { color: #ff4d4d !important; } .bg-fire { background: #8b0000 !important; border: 1px solid #ff4d4d; }
    .color-water { color: #2ecc71 !important; } .bg-water { background: #1b4d3e !important; border: 1px solid #2ecc71; }
    .color-air { color: #3498db !important; } .bg-air { background: #1a365d !important; border: 1px solid #3498db; }
    .color-earth { color: #f39c12 !important; } .bg-earth { background: #7e4a00 !important; border: 1px solid #f39c12; }
    input[type="number"] { width: 60px; padding: 5px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; text-align: center; font-size: 15px; }
    hr { border: 0; border-top: 1px solid #444; margin: 15px 0; grid-column: span 3; }

    /* NOUVEAUX STYLES POUR ONGLETS ET TABLEAUX */
    .tabs-nav { display: flex; margin-bottom: 15px; border: 1px solid #444; }
    .tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: #333; color: #ccc; }
    .tab-btn.active { background: #444; color: #ffaa00; font-weight: bold; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 9px; margin-bottom: 20px; color: white; }
    th { background: #444; border: 1px solid #555; padding: 4px; color: #ffaa00; }
    td { border: 1px solid #555; padding: 2px; }
    input[type="text"] { width: 100%; background: #222; border: none; color: #fff; padding: 2px; box-sizing: border-box; }
  </style>
</head>
<body>

  <div class="tabs-nav">
    <div class="tab-btn active" onclick="showPane(this, 'pane1')">Stats</div>
    <div class="tab-btn" onclick="showPane(this, 'pane2')">Aptitudes</div>
  </div>

  <div id="pane1" class="tab-pane active">
    <h2>Fiche de Personnage</h2>
    <div class="io-panel">
      <button class="btn-io" onclick="exportCampaignText()">💾 Sauvegarder Campagne</button>
      <button class="btn-io" onclick="document.getElementById('fileInput').click()">📂 Charger Fichier</button>
      <input type="file" id="fileInput" accept=".json" onchange="importCampaignText(event)">
    </div>
    <div class="banner-container"><img id="charBanner" src="" alt="Portrait" class="banner-img" /></div>
    <select id="charSelect" class="char-select" onchange="changeCharacter()">
      <option value="mayak">Mayak</option><option value="bawak">Bawak</option>
      <option value="cylak">Cylak</option><option value="borak">Borak</option>
    </select>
    <div id="characterClass" class="classe">-</div>
    <div class="profil-box">
      <div class="profil-item">Âge<span id="p-age">-</span></div>
      <div class="profil-item">Taille<span id="p-taille">-</span></div>
      <div class="profil-item">Poids<span id="p-poids">-</span></div>
      <div class="profil-item">Encombrement<span id="p-enc">-</span></div>
    </div>
    <div class="grid" id="statsContainer"></div>
  </div>

  <div id="pane2" class="tab-pane">
    <h3>Assauts</h3>
    <table><tr><th>Assaut</th><th>Test de Réussite</th><th>Portée Int/Ext</th><th>F-Ini</th></tr>
    <script>for(let i=0; i<10; i++) document.write('<tr>'+'<td><input type="text"></td>'.repeat(4)+'</tr>');</script>
    </table>

    <h3>Pouvoirs</h3>
    <table><tr><th>Pouvoir</th><th>Test de Réussite</th><th>Portée</th><th>Cible</th><th>F-Ini</th></tr>
    <script>for(let i=0; i<10; i++) document.write('<tr>'+'<td><input type="text"></td>'.repeat(5)+'</tr>');</script>
    </table>

    <h3>Spécialités</h3>
    <table><tr><th>Spécialité</th><th>Test de Réussite</th><th>Activ.</th><th>Durée</th></tr>
    <script>for(let i=0; i<10; i++) document.write('<tr>'+'<td><input type="text"></td>'.repeat(4)+'</tr>');</script>
    </table>

    <h3>Recettes</h3>
    <table><tr><th>Recette</th><th>Classe/RdS</th><th>Composants</th><th>Enc.</th></tr>
    <script>for(let i=0; i<10; i++) document.write('<tr>'+'<td><input type="text"></td>'.repeat(4)+'</tr>');</script>
    </table>
  </div>

  <script>
    // --- FONCTION ONGLETS ---
    function showPane(btn, id) {
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    // --- VOTRE SCRIPT ORIGINAL ---
    const EXTENSION_ID = "com.monextension.fiches_simples";
    const aspectTable = { "D12": 6, "D10": 1, "D8": 0, "D6": -1 };
    const characterTemplates = { mayak: { class: "Chasseresse", image: "mayak.png", fire: "D12", water: "D6", air: "D8", earth: "D10" }, bawak: { class: "Guérisseur", image: "bawak.png", fire: "D6", water: "D12", air: "D10", earth: "D8" }, cylak: { class: "Sorçière", image: "cylak.png", fire: "D10", water: "D8", air: "D12", earth: "D6" }, borak: { class: "Protecteur", image: "borak.png", fire: "D10", water: "D8", air: "D6", earth: "D12" } };
    const defaultDynamicStats = { mayak: { res: 22, choc: 16, lien: 14, essence: 18, age: 0, taille: 0, poids: 0 }, bawak: { res: 18, choc: 20, lien: 21, essence: 18, age: 0, taille: 0, poids: 0 }, cylak: { res: 15, choc: 18, lien: 18, essence: 24, age: 0, taille: 0, poids: 0 }, borak: { res: 24, choc: 20, lien: 15, essence: 14, age: 0, taille: 0, poids: 0 } };
    const totemsConfig = { fire: "Totem de Feu", water: "Totem d'Eau", air: "Totem d'Air", earth: "Totem de Terre" };
    const secondaryConfig = { res: "Valeur de Résistance", choc: "Valeur de Choc", lien: "Valeur de Lien", essence: "Valeur d'Essence" };

    let currentStats = JSON.parse(JSON.stringify(defaultDynamicStats));
    let selectedChar = "mayak";

    document.addEventListener("DOMContentLoaded", () => { document.getElementById("charSelect").value = "mayak"; renderCharacter(); });

    OBR.onReady(async () => {
      OBR.room.onMetadataChange((metadata) => { if (metadata[EXTENSION_ID]) { mergeMetadata(metadata[EXTENSION_ID]); renderCharacter(); } });
      const metadata = await OBR.room.getMetadata();
      if (metadata[EXTENSION_ID]) mergeMetadata(metadata[EXTENSION_ID]);
      else await OBR.room.setMetadata({ [EXTENSION_ID]: currentStats });
      renderCharacter();
    });

    function mergeMetadata(incoming) { for (const charKey in defaultDynamicStats) { if (!currentStats[charKey]) currentStats[charKey] = {}; for (const statKey in defaultDynamicStats[charKey]) { currentStats[charKey][statKey] = (incoming[charKey] && incoming[charKey][statKey] !== undefined) ? incoming[charKey][statKey] : defaultDynamicStats[charKey][statKey]; } } }
    function changeCharacter() { selectedChar = document.getElementById("charSelect").value; renderCharacter(); }
    async function verifierEtCalculerPhysique() { const dynamic = currentStats[selectedChar]; const template = characterTemplates[selectedChar]; if (!dynamic.age || dynamic.age === 0) { const deTerre = parseInt(template.earth.replace("D", ""), 10); const deEau = parseInt(template.water.replace("D", ""), 10); const deFeu = parseInt(template.fire.replace("D", ""), 10); dynamic.age = 21 + aspectTable[template.water] + aspectTable[template.earth]; dynamic.poids = 30 + (2 * deTerre) + deEau + 20; dynamic.taille = 80 + (4 * deTerre) + (4 * deFeu) + 15; try { await OBR.room.setMetadata({ [EXTENSION_ID]: currentStats }); } catch(e) {} } }
    async function renderCharacter() { await verifierEtCalculerPhysique(); const template = characterTemplates[selectedChar]; const dynamic = currentStats[selectedChar]; document.getElementById("charBanner").src = template.image; document.getElementById("characterClass").innerText = template.class; const enc = Math.floor((dynamic.poids + dynamic.taille) / 20); document.getElementById("p-age").innerText = `${dynamic.age} ans`; document.getElementById("p-taille").innerText = `${dynamic.taille} cm`; document.getElementById("p-poids").innerText = `${dynamic.poids} kg`; document.getElementById("p-enc").innerText = `${enc} Uté`; const container = document.getElementById("statsContainer"); container.innerHTML = ""; const hL = document.createElement("div"); hL.className = "grid-header left"; hL.innerText = "Totem"; container.appendChild(hL); const hD = document.createElement("div"); hD.className = "grid-header"; hD.innerText = "Dé"; container.appendChild(hD); const hA = document.createElement("div"); hA.className = "grid-header"; hA.innerText = "Aspect"; container.appendChild(hA); for (const [k, l] of Object.entries(totemsConfig)) { const lb = document.createElement("label"); lb.innerText = l; const di = document.createElement("div"); di.className = `dice-val color-${k}`; di.innerText = template[k]; const as = document.createElement("div"); as.className = `aspect-val bg-${k}`; as.innerText = (aspectTable[template[k]] >= 0 ? "+" : "") + aspectTable[template[k]]; container.appendChild(lb); container.appendChild(di); container.appendChild(as); } container.appendChild(document.createElement("hr")); const initL = document.createElement("label"); initL.innerText = "Initiative"; const initV = document.createElement("div"); initV.style.gridColumn = "span 2"; initV.style.textAlign = "right"; initV.innerText = `1d12 + (${aspectTable[template.fire] >= 0 ? '+' : ''}${aspectTable[template.fire]})`; container.appendChild(initL); container.appendChild(initV); const movL = document.createElement("label"); movL.innerText = "Mouvement"; const movV = document.createElement("div"); movV.className = "dice-val"; movV.style.gridColumn = "span 2"; movV.innerText = `${Math.floor(parseInt(template.fire.replace("D",""),10)/2)} cases`; container.appendChild(movL); container.appendChild(movV); const manL = document.createElement("label"); manL.innerText = "Manœuvre"; const manV = document.createElement("div"); manV.className = "dice-val"; manV.style.gridColumn = "span 2"; manV.innerText = "4 Pts"; container.appendChild(manL); container.appendChild(manV); container.appendChild(document.createElement("hr")); for (const [k, l] of Object.entries(secondaryConfig)) { const lb = document.createElement("label"); lb.innerText = l; lb.style.gridColumn = "span 2"; const inP = document.createElement("input"); inP.type = "number"; inP.value = dynamic[k]; inP.onchange = (e) => updateStat(k, parseInt(e.target.value, 10)); container.appendChild(lb); container.appendChild(inP); } }
    async function updateStat(k, v) { currentStats[selectedChar][k] = v; await OBR.room.setMetadata({ [EXTENSION_ID]: currentStats }); }
    function exportCampaignText() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentStats)); const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "campagne_vallee_totems.json"); document.body.appendChild(dl); dl.click(); dl.remove(); }
    function importCampaignText(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            const importedData = JSON.parse(e.target.result);
            console.log("Données importées :", importedData);

            // 1. Mise à jour des Stats
            if (importedData.mayak) { // Vérifie si ce sont bien des stats
                currentStats = importedData; 
                
                // 2. Sauvegarde dans Owlbear pour synchroniser
                if (typeof OBR !== 'undefined' && OBR.room) {
                    await OBR.room.setMetadata({ [EXTENSION_ID]: currentStats });
                }
                
                // 3. Re-dessine l'interface
                renderCharacter();
                alert("Données rechargées avec succès !");
            } else {
                alert("Le format du fichier ne semble pas correspondre à une sauvegarde.");
            }
        } catch (err) {
            console.error("Erreur import :", err);
            alert("Erreur lors de la lecture : " + err.message);
        }
    };
    reader.readAsText(file);
}
  </script>
</body>
</html>
