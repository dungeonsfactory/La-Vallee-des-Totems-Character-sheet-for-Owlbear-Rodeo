<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiches de Personnage - La Vallée des Totems</title>
  <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk/dist/umd/index.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      margin: 0;
      padding: 15px;
    }
    h2 { margin-top: 0; color: #ffaa00; text-align: center; }
    
    /* Style du Bandeau Portrait */
    .banner-container {
      width: 100%;
      height: 100px;
      margin-bottom: 15px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      background: #2a2a2a;
      border: 1px solid #333;
    }
    .banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    select.char-select {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
      margin-bottom: 5px;
      font-size: 16px;
    }
    .classe {
      text-align: center;
      font-style: italic;
      color: #aaa;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px 15px;
      align-items: center;
    }
    .grid-header {
      font-size: 11px;
      text-transform: uppercase;
      color: #777;
      font-weight: bold;
      margin-bottom: -5px;
      text-align: center;
    }
    .grid-header.left { text-align: left; }
    label { font-weight: bold; }
    
    /* Styles pour les dés et aspects fixes */
    .dice-val {
      font-family: monospace;
      font-weight: bold;
      background: #222;
      padding: 4px 8px;
      border-radius: 4px;
      min-width: 35px;
      text-align: center;
    }
    .aspect-val {
      font-weight: bold;
      color: #ffffff;
      padding: 4px 8px;
      border-radius: 4px;
      min-width: 35px;
      text-align: center;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    /* --- CODE COULEUR ÉLÉMENTAIRE --- */
    .color-fire { color: #ff4d4d !important; }
    .bg-fire { background: #8b0000 !important; border: 1px solid #ff4d4d; }

    .color-water { color: #2ecc71 !important; }
    .bg-water { background: #1b4d3e !important; border: 1px solid #2ecc71; }

    .color-air { color: #3498db !important; }
    .bg-air { background: #1a365d !important; border: 1px solid #3498db; }

    .color-earth { color: #f39c12 !important; }
    .bg-earth { background: #7e4a00 !important; border: 1px solid #f39c12; }

    /* Style du bouton de dés */
    .btn-dice {
      background: #ffaa00;
      color: #1a1a1a;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-dice:hover {
      background: #ffc44d;
    }

    .init-tour-box {
      background: #333;
      color: #ffaa00;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 4px;
      text-align: center;
      border: 1px dashed #ffaa00;
      min-width: 35px;
    }

    input[type="number"] {
      width: 60px;
      padding: 5px;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      text-align: center;
      font-size: 15px;
    }
    input[type="number"]:focus {
      border-color: #ffaa00;
      outline: none;
    }
    hr { border: 0; border-top: 1px solid #444; margin: 15px 0; grid-column: span 3; }
  </style>
</head>
<body>

  <h2>Fiche de Personnage</h2>
  
  <div class="banner-container">
    <img id="charBanner" src="" alt="Portrait" class="banner-img" />
  </div>
  
  <select id="charSelect" class="char-select" onchange="changeCharacter()">
    <option value="mayak">Mayak</option>
    <option value="bawak">Bawak</option>
    <option value="cylak">Cylak</option>
    <option value="borak">Borak</option>
  </select>

  <div id="characterClass" class="classe">-</div>

  <div class="grid" id="statsContainer">
    </div>

  <script>
    const EXTENSION_ID = "com.monextension.fiches_simples_v2";
    const DICE_PLUS_ID = "com.missinglinkdev.diceplus";

    const aspectTable = {
      "D12": 6,
      "D10": 1,
      "D8": 0,
      "D6": -1
    };

    const characterTemplates = {
      mayak: { class: "Chasseresse", image: "mayak.png", fire: "D12", water: "D6", air: "D8", earth: "D10" },
      bawak: { class: "Guérisseur", image: "bawak.png", fire: "D6", water: "D12", air: "D10", earth: "D8" },
      cylak: { class: "Sorçière", image: "cylak.png", fire: "D10", water: "D8", air: "D12", earth: "D6" },
      borak: { class: "Protecteur", image: "borak.png", fire: "D10", water: "D8", air: "D6", earth: "D12" }
    };

    const defaultDynamicStats = {
      mayak: { res: 22, choc: 16, lien: 14, essence: 18, initTour: "-" },
      bawak: { res: 18, choc: 20, lien: 21, essence: 18, initTour: "-" },
      cylak: { res: 15, choc: 18, lien: 18, essence: 24, initTour: "-" },
      borak: { res: 24, choc: 20, lien: 15, essence: 14, initTour: "-" }
    };

    const totemsConfig = {
      fire: "Totem de Feu",
      water: "Totem d'Eau",
      air: "Totem d'Air",
      earth: "Totem de Terre"
    };

    const secondaryConfig = {
      res: "Valeur de Résistance",
      choc: "Valeur de Choc",
      lien: "Valeur de Lien",
      essence: "Valeur d'Essence"
    };

    let currentStats = JSON.parse(JSON.stringify(defaultDynamicStats));
    let selectedChar = "mayak";

    window.onload = function() {
      // Dans la version UMD, OBR est directement injecté dans la fenêtre globale (window)
      const obrApi = window.OBR || (window.unbxd && window.unbxd.OBR);
      
      if (!obrApi) {
        console.error("Le SDK Owlbear Rodeo n'est pas accessible.");
        return;
      }

      obrApi.onReady(async () => {
        obrApi.room.onMetadataChange((metadata) => {
          if (metadata[EXTENSION_ID]) {
            mergeMetadata(metadata[EXTENSION_ID]);
            renderCharacter();
          }
        });

        const metadata = await obrApi.room.getMetadata();
        if (metadata[EXTENSION_ID]) {
          mergeMetadata(metadata[EXTENSION_ID]);
        } else {
          await obrApi.room.setMetadata({ [EXTENSION_ID]: currentStats });
        }
        renderCharacter();
      });
    };

    function mergeMetadata(incoming) {
      for (const charKey in defaultDynamicStats) {
        if (!currentStats[charKey]) currentStats[charKey] = {};
        for (const statKey in defaultDynamicStats[charKey]) {
          if (incoming[charKey] && incoming[charKey][statKey] !== undefined) {
            currentStats[charKey][statKey] = incoming[charKey][statKey];
          } else {
            currentStats[charKey][statKey] = defaultDynamicStats[charKey][statKey];
          }
        }
      }
    }

    function changeCharacter() {
      selectedChar = document.getElementById("charSelect").value;
      renderCharacter();
    }

    function renderCharacter() {
      const template = characterTemplates[selectedChar];
      const dynamic = currentStats[selectedChar];
      
      document.getElementById("charBanner").src = template.image;
      document.getElementById("characterClass").innerText = template.class;

      const container = document.getElementById("statsContainer");
      container.innerHTML = ""; 

      // --- SECTION 1 : EN-TÊTES ET TOTEMS ---
      const hLabel = document.createElement("div"); hLabel.className = "grid-header left"; hLabel.innerText = "Totem";
      const hDede = document.createElement("div"); hDede.className = "grid-header"; hDede.innerText = "Dé";
      const hAspect = document.createElement("div"); hAspect.className = "grid-header"; hAspect.innerText = "Aspect";
      container.appendChild(hLabel); container.appendChild(hDede); container.appendChild(hAspect);

      for (const [key, label] of Object.entries(totemsConfig)) {
        const labelEl = document.createElement("label");
        labelEl.innerText = label;

        const diceEl = document.createElement("div");
        diceEl.className = `dice-val color-${key}`;
        diceEl.innerText = template[key];

        const aspectEl = document.createElement("div");
        aspectEl.className = `aspect-val bg-${key}`;
        const valSigne = aspectTable[template[key]] >= 0 ? `+${aspectTable[template[key]]}` : aspectTable[template[key]];
        aspectEl.innerText = valSigne;

        container.appendChild(labelEl);
        container.appendChild(diceEl);
        container.appendChild(aspectEl);
      }

      // Séparateur
      container.appendChild(document.createElement("hr"));

      // --- SECTION 2 : BLOC DYNAMIQUE ---
      const fireDiceStr = template.fire; 
      const fireDiceNum = parseInt(fireDiceStr.replace("D", ""), 10); 
      const fireAspectVal = aspectTable[fireDiceStr]; 
      const mouvementCalcul = Math.floor(fireDiceNum / 2); 

      // Ligne Initiative de base
      const initLabel = document.createElement("label");
      initLabel.innerText = "Initiative (Base)";
      const initBonusEl = document.createElement("div");
      initBonusEl.style.gridColumn = "span 2";
      initBonusEl.style.textAlign = "right";
      initBonusEl.style.fontStyle = "italic";
      initBonusEl.style.color = "#aaa";
      initBonusEl.innerText = `1d12 + (${fireAspectVal >= 0 ? '+' : ''}${fireAspectVal})`;
      container.appendChild(initLabel);
      container.appendChild(initBonusEl);

      // Ligne Bouton Lancer Initiative
      const initTourLabel = document.createElement("label");
      initTourLabel.innerText = "Initiative du Tour";
      
      const btnInit = document.createElement("button");
      btnInit.className = "btn-dice";
      btnInit.innerText = "🎲 Lancer";
      btnInit.onclick = () => rollInitiative(fireAspectVal);

      const initTourVal = document.createElement("div");
      initTourVal.className = "init-tour-box";
      initTourVal.innerText = dynamic.initTour;

      container.appendChild(initTourLabel);
      container.appendChild(btnInit);
      container.appendChild(initTourVal);

      // Ligne Mouvement
      const movLabel = document.createElement("label");
      movLabel.innerText = "Mouvement";
      const movVal = document.createElement("div");
      movVal.className = "dice-val";
      movVal.style.gridColumn = "span 2";
      movVal.innerText = `${mouvementCalcul} cases`;
      container.appendChild(movLabel);
      container.appendChild(movVal);

      // Ligne Manœuvre
      const manLabel = document.createElement("label");
      manLabel.innerText = "Manœuvre";
      const manVal = document.createElement("div");
      manVal.className = "dice-val";
      manVal.style.gridColumn = "span 2";
      manVal.innerText = "4 Pts";
      container.appendChild(manLabel);
      container.appendChild(manVal);

      // Séparateur
      container.appendChild(document.createElement("hr"));

      // --- SECTION 3 : VALEURS SECONDAIRES ---
      for (const [key, label] of Object.entries(secondaryConfig)) {
        const labelEl = document.createElement("label");
        labelEl.innerText = label;
        labelEl.style.gridColumn = "span 2";

        const inputEl = document.createElement("input");
        inputEl.type = "number";
        inputEl.value = dynamic[key];
        inputEl.onchange = (e) => updateStat(key, parseInt(e.target.value, 10));

        container.appendChild(labelEl);
        container.appendChild(inputEl);
      }
    }

    async function updateStat(statKey, newValue) {
      const obrApi = window.OBR || (window.unbxd && window.unbxd.OBR);
      currentStats[selectedChar][statKey] = newValue;
      if(obrApi && obrApi.room) {
        await obrApi.room.setMetadata({
          [EXTENSION_ID]: currentStats
        });
      }
    }

    async function rollInitiative(bonus) {
      const obrApi = window.OBR || (window.unbxd && window.unbxd.OBR);
      const d12Result = Math.floor(Math.random() * 12) + 1;
      const totalInit = d12Result + bonus;

      currentStats[selectedChar].initTour = totalInit;
      
      if(obrApi && obrApi.room) {
        await obrApi.room.setMetadata({
          [EXTENSION_ID]: currentStats
        });
        renderCharacter();

        try {
          await obrApi.messaging.sendMessage(DICE_PLUS_ID, {
            roll: `1d12${bonus >= 0 ? '+' : ''}${bonus}`,
            whisper: false
          });
        } catch (error) {
          console.log("Dice+ non détecté ou inactif.");
        }
      }
    }
  </script>
</body>
</html>
