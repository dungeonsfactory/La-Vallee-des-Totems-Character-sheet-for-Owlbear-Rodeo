<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiches - Vallée des Totems</title>
  <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk"></script>
  <style>
    body { font-family: sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 10px; }
    .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
    .tab-btn { flex: 1; padding: 5px; background: #333; cursor: pointer; text-align: center; }
    .tab-btn.active { background: #555; color: #ffaa00; }
    .pane { display: none; }
    .pane.active { display: block; }
    select, input { background: #222; color: white; border: 1px solid #444; width: 100%; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="tabs"><div class="tab-btn active" onclick="showPane('p1')">Stats</div><div class="tab-btn" onclick="showPane('p2')">Autres</div></div>
  <div id="p1" class="pane active">
    <select id="charSelect" onchange="changeCharacter()"><option value="mayak">Mayak</option><option value="bawak">Bawak</option></select>
    <div id="statsContainer"></div>
    <h3>Protection</h3>
    <select id="protSelect" onchange="updateProtection()"><option value="">Choisir...</option></select>
    <div id="protInfo">-</div>
  </div>
  <div id="p2" class="pane">Données...</div>

  <script>
    const EXTENSION_ID = "com.monextension.fiches_simples";
    const protections = { "Robe": { s: 6, f: "Air" }, "Cotte": { s: 8, f: "Eau" } };
    let currentStats = { mayak: { res: 22, protection: "" }, bawak: { res: 18, protection: "" } };
    let selectedChar = "mayak";

    function showPane(id) {
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function mergeMetadata(incoming) {
        for (let char in incoming) { currentStats[char] = incoming[char]; }
    }

    function renderCharacter() {
        const stats = currentStats[selectedChar];
        document.getElementById('charSelect').value = selectedChar;
        document.getElementById('protSelect').value = stats.protection || "";
        document.getElementById('statsContainer').innerHTML = `Résistance : ${stats.res}`;
    }

    async function changeCharacter() {
        selectedChar = document.getElementById('charSelect').value;
        renderCharacter();
    }

    async function updateProtection() {
        const val = document.getElementById('protSelect').value;
        currentStats[selectedChar].protection = val;
        await OBR.room.setMetadata({ [EXTENSION_ID]: currentStats });
        renderCharacter();
    }

    OBR.onReady(async () => {
        const metadata = await OBR.room.getMetadata();
        if (metadata[EXTENSION_ID]) mergeMetadata(metadata[EXTENSION_ID]);
        
        // Remplissage menu
        const sel = document.getElementById('protSelect');
        Object.keys(protections).forEach(p => { 
            let o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o); 
        });

        renderCharacter();

        OBR.room.onMetadataChange((meta) => {
            if (meta[EXTENSION_ID]) {
                mergeMetadata(meta[EXTENSION_ID]);
                renderCharacter();
            }
        });
    });
  </script>
</body>
</html>
